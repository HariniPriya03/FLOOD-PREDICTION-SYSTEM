<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Predict Flood</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">

</head>

<body>

    <nav>

        <div class="logo">
            Floods Prediction
        </div>

        <ul>

            <li><a href="/">Home</a></li>

            <li><a href="/predict">Predict Floods</a></li>

        </ul>

    </nav>

    <div class="container">

        <h1>Flood Prediction</h1>

        <form action="/predict" method="POST">

            <label>Cloud Cover</label>
            <input type="number" step="any" name="Cloud_Cover" placeholder="Enter Cloud Cover" required>

            <label>Annual Rainfall</label>
            <input type="number" step="any" name="Annual" placeholder="Enter Annual Rainfall" required>

            <label>Jan-Feb Rainfall</label>
            <input type="number" step="any" name="Jan_Feb" placeholder="Enter Jan-Feb Rainfall" required>

            <label>Mar-May Rainfall</label>
            <input type="number" step="any" name="Mar_May" placeholder="Enter Mar-May Rainfall" required>

            <label>Jun-Sep Rainfall</label>
            <input type="number" step="any" name="Jun_Sep" placeholder="Enter Jun-Sep Rainfall" required>

            <input type="submit" value="Predict Flood">

        </form>

    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>

</body>

</html>
